spring:
  application:
    name: comfortable-ledger
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:comfortable_ledger}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8&useUnicode=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:ledger}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:ledgerpass}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  upload-dir: ${APP_UPLOAD_DIR:${APP_DATA_DIR:./data}/uploads}
  card-payment:
    auto-execute-enabled: ${CARD_PAYMENT_AUTO_EXECUTE_ENABLED:true}
    auto-execute-cron: ${CARD_PAYMENT_AUTO_EXECUTE_CRON:0 10 4 * * *}
    zone: ${CARD_PAYMENT_ZONE:Asia/Seoul}
  recurring-transaction:
    auto-generate-enabled: ${RECURRING_TRANSACTION_AUTO_GENERATE_ENABLED:true}
    auto-generate-cron: ${RECURRING_TRANSACTION_AUTO_GENERATE_CRON:0 20 4 * * *}
    zone: ${RECURRING_TRANSACTION_ZONE:Asia/Seoul}

logging:
  file:
    name: ${APP_LOG_DIR:${APP_DATA_DIR:./data}/logs}/application.log
  logback:
    rollingpolicy:
      file-name-pattern: ${APP_LOG_DIR:${APP_DATA_DIR:./data}/logs}/application.%d{yyyy-MM-dd}.%i.log
      max-file-size: 20MB
      max-history: 30

server:
  port: 8080
